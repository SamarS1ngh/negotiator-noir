<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800&family=Playfair+Display:ital@1&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0708;--bone:#f2ece9;--smoke:#9a8f8c;--accent:#e23138;--dim:#7a1a1f;--green:#5aa05f}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--bone);font-family:'Oswald',sans-serif;width:1080px;height:2200px;overflow:hidden;position:relative}
.stage{position:absolute;inset:0}
.stage img{width:100%;height:100%;object-fit:cover;object-position:center 16%;filter:contrast(1.1) brightness(.62)}
.stage::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 30%,rgba(226,49,56,.14),transparent 55%),linear-gradient(180deg,rgba(10,7,8,.5),rgba(10,7,8,.2) 30%,rgba(10,7,8,.9))}
/* slash */
.slash{position:absolute;top:0;left:-10%;width:120%;height:100%;background:linear-gradient(115deg,transparent 46%,rgba(226,49,56,.9) 49%,rgba(226,49,56,.9) 50.5%,transparent 53%);opacity:.5;mix-blend-mode:screen}
.hit{position:absolute;top:150px;left:52px;right:52px;text-align:center;z-index:3}
.hit .k{font-size:30px;letter-spacing:10px;color:var(--accent);text-transform:uppercase}
.hit .big{font-size:118px;font-weight:800;letter-spacing:2px;line-height:.96;color:#fff;text-shadow:0 0 40px rgba(226,49,56,.7),0 6px 26px #000;margin-top:10px}
/* the contradiction */
.contra{position:absolute;top:640px;left:64px;right:64px;z-index:3}
.q{padding:26px 30px;border-radius:10px;background:rgba(18,12,13,.86);border:1px solid #2a1416;margin-bottom:16px;font-family:'Playfair Display',serif;font-style:italic;font-size:40px;color:var(--bone);position:relative}
.q .tag{position:absolute;right:22px;top:-16px;font-family:'Oswald';font-style:normal;font-size:20px;letter-spacing:3px;padding:6px 16px;border-radius:4px;text-transform:uppercase}
.q.said .tag{background:#2a1416;color:var(--smoke)} .q.fact .tag{background:var(--accent);color:#fff}
.q.said{border-left:4px solid var(--dim)} .q.fact{border-left:4px solid var(--accent)}
.vs{text-align:center;font-size:26px;letter-spacing:8px;color:var(--accent);margin:6px 0 16px;text-transform:uppercase}
/* his reaction */
.react{position:absolute;left:64px;right:64px;bottom:360px;z-index:3;font-family:'Playfair Display',serif;font-style:italic;font-size:52px;color:#fff;text-shadow:0 3px 20px #000}
.react::before{content:"\201C";color:var(--accent);font-size:60px;vertical-align:-12px;margin-right:6px}
/* meters/leak */
.foot{position:absolute;left:64px;right:64px;bottom:120px;z-index:3}
.comp{display:flex;align-items:center;gap:20px;margin-bottom:26px}
.comp .lab{font-size:28px;letter-spacing:4px;color:var(--smoke);text-transform:uppercase;width:280px}
.bar{flex:1;height:20px;background:#20110f;border:1px solid #3a1a18;border-radius:10px;overflow:hidden}
.bar i{display:block;height:100%;width:22%;background:linear-gradient(90deg,var(--dim),var(--accent))}
.delta{font-size:34px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono'}
.leak{padding:22px 28px;border:2px solid var(--green);border-radius:10px;background:rgba(20,30,20,.5);font-size:34px;letter-spacing:2px;color:#dff0df}
.leak b{color:var(--green);letter-spacing:4px}
</style></head><body>
<div class="stage"><img src="crisp_wary.jpg"><div class="slash"></div></div>
<div class="hit"><div class="k">you caught him</div><div class="big">THAT'S NOT<br>WHAT YOU SAID</div></div>

<div class="contra">
  <div class="q said"><span class="tag">he said</span>"I don't answer to Marlowe. I run my own book."</div>
  <div class="vs">but you know —</div>
  <div class="q fact"><span class="tag">hard fact</span>He skims off the top and prays the boss doesn't count.</div>
</div>

<div class="react">…how the hell do you know that?</div>

<div class="foot">
  <div class="comp"><div class="lab">his composure</div><div class="bar"><i></i></div><div class="delta">−34</div></div>
  <div class="leak">His fear is out: <b>the boss finding out.</b> Aim there.</div>
</div>
</body></html>

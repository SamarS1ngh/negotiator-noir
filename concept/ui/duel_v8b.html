<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090c;--line:#2a2e38;--bone:#eef0f4;--dim:#9096a4;--faint:#5a6070;
  --crimson:#e23b42;--steel:#6fd3e6;--steel-deep:#2b7180;--gold:#e0b24a;--good:#63c088;
  --pad:clamp(14px,4vw,20px);--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;font-family:'Oswald',sans-serif;color:var(--bone);-webkit-font-smoothing:antialiased}
.screen{position:relative;height:100dvh;overflow:hidden}
.bg{position:absolute;inset:0}.bg img{width:100%;height:100%;object-fit:cover;object-position:center 34%}
.bg::after{content:"";position:absolute;inset:0;background:rgba(8,9,12,.35)}
/* dim veil, but scene still shows around the modal */
.veil{position:absolute;inset:0;z-index:8;background:rgba(6,10,12,.42)}
/* MODAL popup — glassy cyan, on the scene, scrollable, NOT full screen */
.modal{position:absolute;z-index:9;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(90%,380px);max-height:74dvh;display:flex;flex-direction:column;
  border-radius:18px;border:1px solid rgba(111,211,230,.42);
  background:linear-gradient(180deg,rgba(12,26,30,.82),rgba(9,17,21,.86));
  box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 0 1px rgba(111,211,230,.08),0 0 60px rgba(111,211,230,.12)}
.mh{display:flex;align-items:center;gap:9px;padding:16px 16px 4px}
.mh .dot{width:7px;height:7px;border-radius:50%;background:var(--steel);box-shadow:0 0 10px var(--steel)}
.mh .t{font-size:clamp(15px,4.4vw,18px);font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#eafbff}
.mh .x{margin-left:auto;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;color:var(--dim);font-size:13px}
.msub{padding:0 16px;font-size:10.5px;letter-spacing:.1em;color:var(--steel-deep);text-transform:uppercase;margin-bottom:12px}
.mwords{overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:11px}
.word{text-align:left;padding:15px 15px;border-radius:12px;background:linear-gradient(180deg,rgba(18,32,37,.6),rgba(11,19,23,.6));border:1px solid rgba(111,211,230,.22)}
.word.hot{border-color:rgba(111,211,230,.5);box-shadow:0 0 0 1px rgba(111,211,230,.14)}
.word .wt{font-family:'JetBrains Mono';font-size:clamp(14px,3.9vw,16px);line-height:1.4;color:#eef3f6}
.word .wr{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:500}
.rdot{width:8px;height:8px;border-radius:50%}.r-unc{background:var(--gold);box-shadow:0 0 7px rgba(224,178,74,.5)}.r-high{background:var(--crimson);box-shadow:0 0 7px rgba(226,59,66,.5)}
</style></head><body>
<div class="screen">
  <div class="bg"><img src="collector/wide.jpg" alt=""></div>
  <div class="veil"></div>
  <div class="modal">
    <div class="mh"><span class="dot"></span><span class="t">Plant Doubt</span><span class="x">✕</span></div>
    <div class="msub">choose your words</div>
    <div class="mwords">
      <button class="word hot"><div class="wt">"Marlowe quoted me different terms than you did."</div><div class="wr"><span class="rdot r-unc"></span> uncertain · could go either way</div></button>
      <button class="word"><div class="wt">"Funny — your own crew doesn't back that number."</div><div class="wr"><span class="rdot r-unc"></span> uncertain · could go either way</div></button>
      <button class="word"><div class="wt">"You sure this is even your call to make?"</div><div class="wr"><span class="rdot r-high"></span> high risk · could blow up</div></button>
    </div>
  </div>
</div>
</body></html>

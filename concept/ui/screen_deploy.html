<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700;800&family=Playfair+Display:ital@1&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0708;--bone:#f2ece9;--smoke:#9a8f8c;--accent:#e23138;--dim:#7a1a1f;--gold:#c8a23a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--bone);font-family:'Oswald',sans-serif;width:1080px;height:2200px;overflow:hidden;position:relative}
.stage{position:absolute;inset:0}
.stage img{width:100%;height:100%;object-fit:cover;object-position:center 16%;filter:contrast(1.1) brightness(.6)}
.stage::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 30%,rgba(226,49,56,.14),transparent 55%),linear-gradient(180deg,rgba(10,7,8,.5),rgba(10,7,8,.2) 30%,rgba(10,7,8,.92))}
.hit{position:absolute;top:150px;left:52px;right:52px;text-align:center;z-index:3}
.hit .k{font-size:30px;letter-spacing:10px;color:var(--accent);text-transform:uppercase}
.hit .big{font-size:120px;font-weight:800;letter-spacing:2px;line-height:.96;color:#fff;text-shadow:0 0 40px rgba(226,49,56,.7),0 6px 26px #000;margin-top:10px}
/* the leverage card slapped down */
.card{position:absolute;top:600px;left:50%;transform:translateX(-50%) rotate(-3deg);width:760px;padding:44px 46px;z-index:4;
  background:linear-gradient(180deg,#17100f,#100a0b);border:2px solid var(--accent);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.8),0 0 60px rgba(226,49,56,.3)}
.card .lab{font-size:24px;letter-spacing:6px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;font-family:'JetBrains Mono'}
.card .fact{font-size:56px;font-weight:600;line-height:1.15;color:#fff}
.card .src{margin-top:18px;font-size:24px;letter-spacing:2px;color:var(--smoke);font-family:'JetBrains Mono'}
/* your line */
.you{position:absolute;left:64px;right:64px;bottom:470px;z-index:3;font-family:'Playfair Display',serif;font-style:italic;font-size:54px;line-height:1.25;color:#fff;text-shadow:0 3px 20px #000}
.you .who{display:block;font-family:'Oswald';font-style:normal;font-size:24px;letter-spacing:5px;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
/* his break */
.react{position:absolute;left:64px;right:64px;bottom:300px;z-index:3;font-family:'Playfair Display',serif;font-style:italic;font-size:46px;color:#d8cfcc;text-shadow:0 3px 18px #000}
.react::before{content:"\201C";color:var(--accent);font-size:52px;vertical-align:-10px;margin-right:6px}
.foot{position:absolute;left:64px;right:64px;bottom:120px;z-index:3;display:flex;align-items:center;gap:20px}
.foot .lab{font-size:28px;letter-spacing:4px;color:var(--smoke);text-transform:uppercase;width:280px}
.bar{flex:1;height:20px;background:#20110f;border:1px solid #3a1a18;border-radius:10px;overflow:hidden}
.bar i{display:block;height:100%;width:9%;background:linear-gradient(90deg,var(--dim),var(--accent))}
.delta{font-size:34px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono'}
</style></head><body>
<div class="stage"><img src="crisp_wary.jpg"></div>
<div class="hit"><div class="k">you play your card</div><div class="big">LEVERAGE</div></div>

<div class="card"><div class="lab">▸ deployed · hard fact</div><div class="fact">He skims off the top of his own boss.</div><div class="src">// you've had this the whole time</div></div>

<div class="you"><span class="who">you</span>One call to your boss, Sal, and you're not the collector anymore — you're the collateral.</div>
<div class="react">…okay. Okay. What do you want.</div>

<div class="foot"><div class="lab">his composure</div><div class="bar"><i></i></div><div class="delta">−41</div></div>
</body></html>
